[Languages.ru.params]
  sitename = "Fedor_Chagin"
  defaultColor = "dark"
  description = "Fedor Chagin"
  mainSections = ['posts']
  toc = true
  tocOpen = false
  goToTop = true
  additionalScripts = []
  dateFormat = ""
  rssFeedDescription = "summary"

[Languages.ru.params.author]
  avatar = "avatar.jpg"
  intro = "Фёдор Чагин"
  name = "Чагин Фёдор"
  description = "Студент 2 курса ИВТ. Интересуюсь низкоуровневыми аспектами программирования, развиваюсь в сторону проектирования систем и руководства проектами. Люблю продумывать алгоритмы, разрабатывать UX и архитектуру. Изучаю C+SDL."

[[Languages.ru.params.socialIcons]]
